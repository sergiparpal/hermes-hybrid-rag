name: hybrid-rag
version: 0.1.0
description: >-
  Advanced + Hierarchical RAG over local documents (md/txt/pdf) — hybrid
  BM25+dense search with query expansion, reranking, and parent-unit retrieval.
author: Sergi Parpal
provides_tools:
  - rag_search
  - rag_drill_down
  - rag_list_sources
provides_hooks:
  - pre_llm_call
  - on_session_start
# `requires_env` deliberately omitted: the plugin runs with zero env vars set.
# All three vars below are optional and degrade gracefully when missing.
# Listed as documentation only; Hermes does not parse this key.
optional_env:
  - COHERE_API_KEY        # Cohere reranker; falls back to local cross-encoder.
  - ANTHROPIC_API_KEY     # Query expansion; falls back to no expansion.
  - HERMES_RAG_DATA_DIR   # Override data dir; defaults to ~/.hermes/...
